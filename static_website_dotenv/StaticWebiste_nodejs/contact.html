<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TechLoka AI — Contact</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@300;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F0EDE6;
  --dark:#0C0C0C;
  --white:#FAFAF8;
  --accent:#FF3D00;
  --serif:'Fraunces',serif;
  --sans:'Outfit',sans-serif;
}
body{
  background:var(--bg);
  font-family:var(--sans);
  color:var(--dark);
  overflow-x:hidden;
  cursor:none;
}

/* SAME CURSOR */
#cdot,#cring{
 position:fixed;pointer-events:none;z-index:9999;
}
#cdot{
 width:7px;height:7px;background:var(--accent);
 border-radius:50%;transform:translate(-50%,-50%);
}
#cring{
 width:34px;height:34px;border:1.5px solid rgba(12,12,12,.4);
 border-radius:50%;transform:translate(-50%,-50%);
}

/* NAV SAME */
nav{
 position:fixed;top:0;width:100%;
 display:flex;justify-content:space-between;
 padding:24px 64px;
}
.nav-links{display:flex;gap:40px;list-style:none}
.nav-links a{
 text-decoration:none;
 color:var(--dark);
 text-transform:uppercase;
 font-size:.8rem;
}

/* HERO */
.hero{
 min-height:60vh;
 padding:140px 64px;
 display:flex;
 align-items:flex-end;
 background:var(--dark);
 color:white;
}
.hero h1{
 font-family:var(--serif);
 font-size:5rem;
}
.hero em{color:var(--accent)}

/* CONTACT SECTION */
.contact{
 padding:100px 64px;
 display:grid;
 grid-template-columns:1fr 1fr;
 gap:60px;
}

/* LEFT SIDE */
.info h2{
 font-family:var(--serif);
 font-size:2.5rem;
 margin-bottom:20px;
}
.info p{
 color:rgba(12,12,12,.5);
 line-height:1.7;
}
.info div{
 margin-top:20px;
}

/* FORM */
form{
 background:var(--white);
 padding:40px;
 border-radius:20px;
 box-shadow:0 20px 50px rgba(0,0,0,.05);
}

input,textarea{
 width:100%;
 padding:14px;
 margin-bottom:20px;
 border:1px solid rgba(0,0,0,.1);
 border-radius:10px;
 font-family:var(--sans);
}

button{
 background:var(--dark);
 color:white;
 padding:14px 30px;
 border:none;
 border-radius:50px;
 transition:.3s;
}
button:hover{
 background:var(--accent);
}

/* FOOTER */
footer{
 background:var(--dark);
 color:white;
 padding:40px;
 text-align:center;
}
</style>

</head>

<body>

<div id="cdot"></div>
<div id="cring"></div>

<nav>
 <h3>TechLoka</h3>
 <ul class="nav-links">
   <li><a href="index.html">Home</a></li>
   <li><a href="about.html">About</a></li>
   <li><a href="services.html">Services</a></li>
   <li><a href="contact.html">Contact</a></li>
 </ul>
</nav>

<section class="hero">
 <h1>Let's build<br><em>something big.</em></h1>
</section>

<section class="contact">

<div class="info">
 <h2>Get in touch</h2>
 <p>Have a project in mind? Let’s talk. We design AI systems that scale globally.</p>
 <div>Email: contact@techloka.ai</div>
 <div>Phone: +91 99999 99999</div>
</div>

<form>
 <input placeholder="Your Name">
 <input placeholder="Email">
 <textarea rows="5" placeholder="Your Message"></textarea>
 <button>Send Message →</button>
</form>

</section>

<footer>
 © 2025 TechLoka AI
</footer>

<script>
const dot=document.getElementById('cdot');
const ring=document.getElementById('cring');

document.addEventListener('mousemove',e=>{
 dot.style.left=e.clientX+'px';
 dot.style.top=e.clientY+'px';
 ring.style.left=e.clientX+'px';
 ring.style.top=e.clientY+'px';
});
</script>

</body>
</html>
